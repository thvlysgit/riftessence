services:
  db:
    image: postgres:15
    platform: linux/arm64
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: riftessence
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    platform: linux/arm64
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    platform: linux/arm64
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    working_dir: /app/apps/api
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3333/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/riftessence
      RIOT_API_KEY: ${RIOT_API_KEY}
      DISCORD_BOT_API_KEY: ${DISCORD_BOT_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-changeme_generate_a_real_secret_in_production}
      PORT: "3333"
      REDIS_URL: redis://redis:6379
      ALLOW_ORIGIN: ${ALLOW_ORIGIN:-http://localhost:3000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      NODE_ENV: ${NODE_ENV:-development}
      PRISMA_CLIENT_ENGINE_TYPE: binary
      PRISMA_CLI_QUERY_ENGINE_TYPE: binary
    depends_on:
      - db
      - redis
    ports:
      - "3333:3333"
    # Run the image's default CMD (compiled JS). Removing the dev command
    # avoids ts-node-dev restarts and lets the image-run compiled app start.

  discord-bot:
    platform: linux/arm64
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./discord-bot/Dockerfile
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_BOT_API_KEY: ${DISCORD_BOT_API_KEY}
      API_BASE_URL: http://api:3333
      APP_URL: ${FRONTEND_URL:-https://riftessence.app}
      DISCORD_BOT_POLL_INTERVAL_MS: ${DISCORD_BOT_POLL_INTERVAL_MS:-60000}
    depends_on:
      api:
        condition: service_healthy

volumes: {}

