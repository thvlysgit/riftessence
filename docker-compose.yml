services:
  db:
    image: postgres:15
    platform: linux/arm64
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: riftessence
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7
    platform: linux/arm64
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"

  api:
    platform: linux/arm64
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    working_dir: /app/apps/api
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3333/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@db:5432/riftessence?connection_limit=8&pool_timeout=30}
      RIOT_API_KEY: ${RIOT_API_KEY}
      DISCORD_BOT_API_KEY: ${DISCORD_BOT_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-lfd_session}
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-}
      SESSION_COOKIE_MAX_AGE_SECONDS: ${SESSION_COOKIE_MAX_AGE_SECONDS:-43200}
      OAUTH_STATE_SECRET: ${OAUTH_STATE_SECRET:-}
      PORT: "3333"
      REDIS_URL: redis://redis:6379
      ALLOW_ORIGIN: ${ALLOW_ORIGIN:-http://localhost:3000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-RiftEssence}
      PASSWORD_RESET_TOKEN_TTL_MINUTES: ${PASSWORD_RESET_TOKEN_TTL_MINUTES:-30}
      NODE_ENV: ${NODE_ENV:-development}
      PRISMA_CLIENT_ENGINE_TYPE: binary
      PRISMA_CLI_QUERY_ENGINE_TYPE: binary
      PRISMA_QUERY_RETRY_ATTEMPTS: ${PRISMA_QUERY_RETRY_ATTEMPTS:-2}
      PRISMA_QUERY_RETRY_DELAY_MS: ${PRISMA_QUERY_RETRY_DELAY_MS:-220}
      PRISMA_ENGINE_CONNECT_COOLDOWN_MS: ${PRISMA_ENGINE_CONNECT_COOLDOWN_MS:-500}
      PRISMA_MAX_CONCURRENT_QUERIES: ${PRISMA_MAX_CONCURRENT_QUERIES:-10}
      BAN_CHECK_CACHE_TTL_MS: ${BAN_CHECK_CACHE_TTL_MS:-60000}
      PROFILE_ROUTE_RESPONSE_CACHE_TTL_SECONDS: ${PROFILE_ROUTE_RESPONSE_CACHE_TTL_SECONDS:-8}
      PROFILE_ROUTE_USER_CACHE_TTL_SECONDS: ${PROFILE_ROUTE_USER_CACHE_TTL_SECONDS:-12}
      PASSWORD_REMINDER_CHECK_CACHE_TTL_SECONDS: ${PASSWORD_REMINDER_CHECK_CACHE_TTL_SECONDS:-900}
      COMMUNITY_LIST_CACHE_TTL_SECONDS: ${COMMUNITY_LIST_CACHE_TTL_SECONDS:-20}
      BADGES_CACHE_TTL_SECONDS: ${BADGES_CACHE_TTL_SECONDS:-180}
      NOTIFICATIONS_CACHE_TTL_SECONDS: ${NOTIFICATIONS_CACHE_TTL_SECONDS:-6}
      CHAT_UNREAD_COUNT_CACHE_TTL_SECONDS: ${CHAT_UNREAD_COUNT_CACHE_TTL_SECONDS:-3}
    depends_on:
      - db
      - redis
    ports:
      - "3333:3333"
    # Run the image's default CMD (compiled JS). Removing the dev command
    # avoids ts-node-dev restarts and lets the image-run compiled app start.

  discord-bot:
    platform: linux/arm64
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./discord-bot/Dockerfile
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_BOT_API_KEY: ${DISCORD_BOT_API_KEY}
      API_BASE_URL: http://api:3333
      APP_URL: ${FRONTEND_URL:-https://riftessence.app}
      DISCORD_BOT_POLL_INTERVAL_MS: ${DISCORD_BOT_POLL_INTERVAL_MS:-60000}
      DISCORD_LFT_POLL_INTERVAL_MS: ${DISCORD_LFT_POLL_INTERVAL_MS:-45000}
      DISCORD_DM_POLL_INTERVAL_MS: ${DISCORD_DM_POLL_INTERVAL_MS:-45000}
      DISCORD_TEAM_EVENT_POLL_INTERVAL_MS: ${DISCORD_TEAM_EVENT_POLL_INTERVAL_MS:-45000}
      DISCORD_ROLE_FORWARDING_POLL_INTERVAL_MS: ${DISCORD_ROLE_FORWARDING_POLL_INTERVAL_MS:-300000}
    depends_on:
      api:
        condition: service_healthy

volumes: {}

